    function GlowBlob({ style }) {

    function TypeWriter({ texts }) {
      const [displayed, setDisplayed] = useState("");
      const [textIdx, setTextIdx] = useState(0);
      const [charIdx, setCharIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        const current = texts[textIdx];
        let timeout;
        if (!deleting && charIdx < current.length) {
          timeout = setTimeout(() => setCharIdx(i => i + 1), 60);
        } else if (!deleting && charIdx === current.length) {
          timeout = setTimeout(() => setDeleting(true), 1800);
        } else if (deleting && charIdx > 0) {
          timeout = setTimeout(() => setCharIdx(i => i - 1), 35);
        } else if (deleting && charIdx === 0) {
          setDeleting(false);
          setTextIdx(i => (i + 1) % texts.length);
        }
        return () => clearTimeout(timeout);
      }, [charIdx, deleting, textIdx, texts]);

      return (
        <span style={{ color: "#00d4ff" }}>
          {texts[textIdx].slice(0, charIdx)}
          <span style={{ borderRight: "2px solid #00d4ff", animation: "blink 1s step-end infinite" }} />
        </span>
      );
    }

      );
    }

    function App() {
      const [active, setActive] = useState("ABOUT");

      useEffect(() => {
        const handleScroll = () => {
          const sections = NAV_LINKS.map(l => document.getElementById(l.toLowerCase()));
          const scrollY = window.scrollY + 100;
          for (let i = sections.length - 1; i >= 0; i--) {
            if (sections[i] && scrollY >= sections[i].offsetTop) {
              setActive(NAV_LINKS[i]);
              break;
            }
          }
        };
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      return (
        <>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
            * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
            body { background: #080812; color: #f1f5f9; }
            ::-webkit-scrollbar { width: 4px; }
            ::-webkit-scrollbar-track { background: #0a0a14; }
            ::-webkit-scrollbar-thumb { background: #00d4ff44; border-radius: 4px; }
            @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
            @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
            @media (max-width: 768px) {
              .desktop-nav { display: none !important; }
              .menu-btn { display: flex !important; }
              section > div > div[style*="grid-template-columns: 1fr 1fr"] {
                grid-template-columns: 1fr !important;
              }
            }
            a:hover { opacity: 0.8; }
          `}</style>
          <div style={{ minHeight: "100vh", background: "#080812", position: "relative" }}>
            <NavBar active={active} setActive={setActive} />
            <HeroSection />
            <AboutSection />
            <ExperienceSection />
            <SkillsSection />
            <ProjectsSection />
            <ContactSection />
            <Footer />
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
